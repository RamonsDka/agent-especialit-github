name: Documentation improvement
description: Report missing, unclear, or inaccurate documentation.
title: "docs: "
labels:
  - documentation
body:
  - type: input
    id: location
    attributes:
      label: Documentation location
      placeholder: docs/workflows.md
    validations:
      required: true
  - type: textarea
    id: issue
    attributes:
      label: What needs improvement?
    validations:
      required: true
  - type: textarea
    id: suggested
    attributes:
      label: Suggested wording or evidence
